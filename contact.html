<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Rodrigo Frutuoso</title>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom CSS -->
    <link href="styles/styles.css" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-5">
        <div class="row">
            <div class="col-md-6">
                <h1>Get in Touch</h1>
                <p>Feel free to send me a message!</p>

                <div class="contact-info mt-5">
                    <h4>Contact Information</h4>
                    <ul class="list-unstyled">
                        <li class="mb-2 d-flex align-items-center">
                            <a href="mailto:rodrigoafonsofrutuoso@gmail.com" class="d-flex align-items-center">
                                <img src="images/email.png" alt="Email" width="40" height="40" class="contact-icon mr-2">
                                rodrigoafonsofrutuoso@gmail.com
                            </a>
                        </li>
                        <li class="mb-2 d-flex align-items-center">
                            <a href="https://github.com/Rodrigo-Frutuoso" target="_blank" class="d-flex align-items-center">
                                <img src="images/github.png" alt="GitHub" width="40" height="40" class="contact-icon mr-2">
                                GitHub
                            </a>
                        </li>
                        <li class="d-flex align-items-center">
                            <a href="https://www.linkedin.com/in/rodrigo-frutuoso/" target="_blank" class="d-flex align-items-center">
                                <img src="images/linkedin.png" alt="LinkedIn" width="40" height="40" class="contact-icon mr-2">
                                LinkedIn
                            </a>
                        </li>                                     
                    </ul>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h3 class="card-title">Send Me a Message</h3>
                        <form id="contact-form">
                            <div class="form-group">
                                <label for="name">Name</label>
                                <input type="text" class="form-control" name="name" required>
                            </div>
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" class="form-control" name="email" required>
                            </div>
                            <div class="form-group">
                                <label for="message">Message</label>
                                <textarea class="form-control" name="message" rows="5" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>     
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="scripts/javascript.js"></script>

    <!-- Form handling -->
    <script>
        document.getElementById("contact-form").addEventListener("submit", function (e) {
            e.preventDefault();

            const form = e.target;
            const name = form.name.value.trim();
            const email = form.email.value.trim();
            const message = form.message.value.trim();

            if (!name || !email || !message) {
                alert("Please fill out all fields.");
                return;
            }

            const data = new FormData(form);

            fetch("https://formspree.io/f/xwpljvnv", {
                method: "POST",
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    window.location.href = "thank-you.html";
                } else {
                    alert("There was a problem sending your message.");
                }
            }).catch(() => {
                alert("Error submitting the form.");
            });
        });
    </script>
</body>
</html>
